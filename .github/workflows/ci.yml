name: CI

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

permissions:
  contents: read

jobs:
  backend:
    name: Backend Build and Test
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: dynamo
          POSTGRES_PASSWORD: dynamo
          POSTGRES_DB: dynamodb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'
    
    - name: Restore dependencies
      run: dotnet restore apps/backend/Dynamo.CMS.sln
    
    - name: Build
      run: dotnet build apps/backend/Dynamo.CMS.sln --no-restore
    
    - name: Test
      run: dotnet test apps/backend/Dynamo.CMS.sln --no-build --verbosity normal
      env:
        ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=dynamodb;Username=dynamo;Password=dynamo"

  frontend:
    name: Frontend Build and Test
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.19'
        cache: 'npm'
        cache-dependency-path: apps/frontend/package-lock.json
    
    - name: Install dependencies
      run: npm ci
      working-directory: apps/frontend
    
    - name: Build
      run: npm run build
      working-directory: apps/frontend
    
    - name: Test
      run: npm test -- --watch=false --browsers=ChromeHeadless
      working-directory: apps/frontend
