version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: dynamo-postgres
    environment:
      POSTGRES_DB: dynamodb
      POSTGRES_USER: dynamo
      POSTGRES_PASSWORD: dynamo
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dynamo"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dynamo-network

  # .NET Backend API
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: dynamo-backend
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=dynamodb;Username=dynamo;Password=dynamo
      - Storage__Static__RootLocation=/app/uploads
    ports:
      - "7000:80"
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dynamo-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Angular Frontend
  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      args:
        - API_URL=http://localhost:7000/api
    container_name: dynamo-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - dynamo-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    driver: local
  backend_uploads:
    driver: local

networks:
  dynamo-network:
    driver: bridge
